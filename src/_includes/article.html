---
layout: base.html
---

<!--
  Article layout.
  This template is itself wrapped by base.html (note the `layout` front matter
  above), so it only needs to render the article-specific chrome: the header
  built from the Markdown file's front matter, and the rendered body content.
-->
<article class="mx-auto max-w-3xl px-4 py-16">
  <header class="mb-8 border-b border-gray-100 pb-8">
    <a href="/articles/" class="text-sm font-medium text-brand-700">&larr; Back to articles</a>
    <h1 class="mt-4 text-4xl font-extrabold tracking-tight">{{ title }}</h1>
    <p class="mt-3 text-sm text-gray-500">
      By {{ author }}
      {% if date %}· <time datetime="{{ date | date('%Y-%m-%d') }}">{{ date | date("%B %e, %Y") }}</time>{% endif %}
    </p>
  </header>

  <!-- `content` holds the Markdown compiled to HTML -->
  <div class="prose max-w-none">{{ content | safe }}</div>
</article>
